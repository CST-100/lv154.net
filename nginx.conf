server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;

  # status.json: short cache so cron updates show up quickly
  location = /status.json {
    expires 5m;
    add_header Cache-Control "public, max-age=300";
  }

  # html: short cache, content can change between deploys
  location ~* \.html$ {
    expires 5m;
    add_header Cache-Control "public, max-age=300";
  }

  # fonts/images: long cache
  location ~* \.(woff2?|png|jpg|jpeg|svg|ico)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  location / {
    try_files $uri $uri/ $uri/index.html =404;
  }
}
