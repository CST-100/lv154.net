server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;

  # status.json: written by status_check.py every ~60s, no caching
  location = /status.json {
    expires off;
    add_header Cache-Control "no-store" always;
  }

  # heartbeat receiver: nginx proxies /_hb/<secret>/<name> to the local
  # python http server (status_check.py). Secret check + write happen there.
  location ~ ^/_hb/(.+)$ {
    proxy_pass http://127.0.0.1:8765/$1;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 5s;
    proxy_connect_timeout 2s;
  }

  # html: short cache, content can change between deploys
  location ~* \.html$ {
    expires 5m;
    add_header Cache-Control "public, max-age=300";
  }

  # fonts/images: long cache
  location ~* \.(woff2?|png|jpg|jpeg|svg|ico)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  location / {
    try_files $uri $uri/ $uri/index.html =404;
  }
}
