# lv154.net — static site behind traefik on unraid.
#
# >>> ADJUST THESE TO MATCH YOUR TRAEFIK SETUP <<<
#   - network name (`proxy` is the unraid default; some use `traefik`)
#   - entrypoint name (`websecure` is the most common https entrypoint)
#   - certresolver name (`letsencrypt`, `myresolver`, etc.)
#   - the host rule (currently `lv154.net` and `www.lv154.net`)
# Check `docker network ls` and your existing traefik labels on another
# container if unsure.

services:
  lv154:
    build: .
    image: lv154-site:latest
    container_name: lv154-site
    restart: unless-stopped
    networks:
      - proxy
    environment:
      # Container self-updates from this repo every POLL_INTERVAL seconds.
      # Push to REPO_REF on GitHub → live within ~POLL_INTERVAL. `docker
      # restart lv154-site` forces an immediate pull + rebuild.
      REPO_URL: https://github.com/CST-100/lv154.net.git
      REPO_REF: main
      POLL_INTERVAL: "300"
      # Shared secret used by heartbeat URL: GET /_hb/<secret>/<name>.
      # Sourced from .env on the unraid host (gitignored). Generate with
      # `openssl rand -hex 24` and put HEARTBEAT_SECRET=... in .env.
      HEARTBEAT_SECRET: ${HEARTBEAT_SECRET:?set HEARTBEAT_SECRET in .env on the host}
      # How often status_check.py rewrites status.json and re-probes systems.
      CHECK_INTERVAL: "60"
    volumes:
      # Persists per-system heartbeat timestamps across container restarts.
      - lv154-heartbeats:/data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # Matches jekyll's old rule pattern so /xrpc (PDS) and /crash (crashwiki)
      # keep routing to their own services. /_matrix and /_tuwunel have higher
      # priority routers already, so no exclusion needed for them.
      # Priority 100 beats the jekyll@file router (priority 66).
      - "traefik.http.routers.lv154.rule=(Host(`lv154.net`) || Host(`www.lv154.net`)) && !PathPrefix(`/xrpc`) && !PathPrefix(`/crash`)"
      - "traefik.http.routers.lv154.priority=100"
      - "traefik.http.routers.lv154.entrypoints=https"
      - "traefik.http.routers.lv154.tls=true"
      - "traefik.http.routers.lv154.tls.certresolver=letsencrypt"
      - "traefik.http.services.lv154.loadbalancer.server.port=80"
      # Redirect www → apex
      - "traefik.http.middlewares.lv154-www-redirect.redirectregex.regex=^https?://www\\.lv154\\.net/(.*)"
      - "traefik.http.middlewares.lv154-www-redirect.redirectregex.replacement=https://lv154.net/$${1}"
      - "traefik.http.middlewares.lv154-www-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.lv154.middlewares=lv154-www-redirect"

networks:
  proxy:
    external: true

volumes:
  lv154-heartbeats: {}
